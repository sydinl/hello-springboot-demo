spring:
  # 应用配置
  application:
    name: hello

  # 数据库配置
  datasource:
    url: jdbc:mysql://test-db1-mysql.ns-w8j0rju7.svc:3306/mydb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: 6vm4ht7d
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

# 服务器配置
server:
  port: 8443
  ssl:
    key-store-type: PKCS12
    key-store: classpath:ssl/keystore.p12
    key-store-password: password
    key-alias: tomcat

# 自定义配置
custom:
  server:
    port:
      http: 8080

# 微信支付配置
# 必填（缺一则走模拟支付）：mch-id、app-id、api-key；回调需 notify-url 可访问
# 环境变量：WECHAT_PAY_MCH_ID、WECHAT_PAY_APP_ID、WECHAT_PAY_API_KEY、WECHAT_PAY_NOTIFY_URL
# 小程序支付时 app-id 必须与小程序 AppID 一致（可与 miniprogram.appid 同）
wechat:
  pay:
    mch-id: ${WECHAT_PAY_MCH_ID:}
    app-id: ${WECHAT_PAY_APP_ID:${WECHAT_MINIPROGRAM_APPID:}}
    api-key: ${WECHAT_PAY_API_KEY:}
    cert-path: ${WECHAT_PAY_CERT_PATH:}
    base-url: https://api.mch.weixin.qq.com
    notify-url: ${WECHAT_PAY_NOTIFY_URL:https://wkudoxukpypt.sealoshzh.site/api/order/payment/callback}
    timeout-minutes: 30
  miniprogram:
    appid: ${WECHAT_MINIPROGRAM_APPID:wxc1677434b58be76d}
    secret: ${WECHAT_MINIPROGRAM_SECRET:}

# JWT配置（secret 已生成，生产环境建议用环境变量 JWT_SECRET 覆盖）
jwt:
  secret: l0FTlNA0iC4Q93eY4tnqq6IKa0LW6aUtUAodlOmn9e5l0eK1vEdP6KZYf9W5psD6
  expiration: 86400000

# 图片存储路径
file:
  upload-dir: /upload

# 日志配置
logging:
  level:
    com.example.hello: DEBUG
    # org.springframework.web: DEBUG
    # org.springframework.http: DEBUG
    # org.springframework.web.servlet: DEBUG
    # org.springframework.security.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  charset:
    console: UTF-8
    file: UTF-8