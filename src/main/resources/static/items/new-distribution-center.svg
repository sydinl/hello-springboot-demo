<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="distributionBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9D4D" />
      <stop offset="100%" stop-color="#FF6A00" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- 主圆形背景 -->
  <circle cx="150" cy="150" r="120" fill="url(#distributionBg)" filter="url(#glow)" />
  
  <!-- 装饰图形 - 连接的圆环表示分销网络 -->
  <g stroke="#FFF" stroke-width="5" fill="none">
    <circle cx="150" cy="80" r="30" />
    <circle cx="90" cy="180" r="25" />
    <circle cx="210" cy="180" r="25" />
    <!-- 连接线 -->
    <line x1="150" y1="110" x2="105" y2="155" />
    <line x1="150" y1="110" x2="195" y2="155" />
    <line x1="105" y1="205" x2="195" y2="205" />
  </g>
  
  <!-- 文字 -->
  <text x="150" y="130" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFF" text-anchor="middle">共赢分销</text>
  <text x="150" y="180" font-family="Arial, sans-serif" font-size="22" fill="#FFF" text-anchor="middle">共享财富</text>
</svg>