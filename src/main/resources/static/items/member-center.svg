<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆形 -->
  <defs>
    <linearGradient id="memberBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007aff" />
      <stop offset="100%" stop-color="#00aaff" />
    </linearGradient>
    <filter id="memberGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- 主体圆形 -->
  <circle cx="100" cy="100" r="80" fill="url(#memberBg)" filter="url(#memberGlow)" />
  
  <!-- 装饰性元素 -->
  <circle cx="100" cy="100" r="70" fill="rgba(255,255,255,0.1)" />
  <circle cx="100" cy="100" r="50" fill="rgba(255,255,255,0.15)" />
  
  <!-- 会员皇冠 -->
  <path d="M100,40 L110,70 L140,70 L115,90 L125,120 L100,100 L75,120 L85,90 L60,70 L90,70 Z" fill="white" opacity="0.95" />
  
  <!-- 皇冠装饰 -->
  <circle cx="100" cy="55" r="10" fill="white" opacity="0.3" />
  
  <!-- 会员卡片元素 -->
  <rect x="65" y="90" width="70" height="40" rx="5" fill="rgba(255,255,255,0.8)" />
  <line x1="70" y1="105" x2="130" y2="105" stroke="#007aff" stroke-width="3" />
  <line x1="70" y1="120" x2="120" y2="120" stroke="#007aff" stroke-width="2" />
  
  <!-- 会员星星 -->
  <path d="M80,130 L85,140 L95,140 L88,146 L90,156 L80,152 L70,156 L72,146 L65,140 L75,140 Z" fill="white" opacity="0.9" />
  <path d="M100,130 L105,140 L115,140 L108,146 L110,156 L100,152 L90,156 L92,146 L85,140 L95,140 Z" fill="white" opacity="0.9" />
  <path d="M120,130 L125,140 L135,140 L128,146 L130,156 L120,152 L110,156 L112,146 L105,140 L115,140 Z" fill="white" opacity="0.9" />
  
  <!-- 添加文字 -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">会员中心</text>
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">尊享特权</text>
</svg>