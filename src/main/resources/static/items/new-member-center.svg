<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="memberBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D9BFF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="memberGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- 主圆形背景 -->
  <circle cx="150" cy="150" r="120" fill="url(#memberBg)" filter="url(#memberGlow)" />
  
  <!-- 皇冠图案 -->
  <path d="M150 60 L170 100 L210 100 L180 125 L190 165 L150 145 L110 165 L120 125 L90 100 L130 100 Z" fill="#FFD700" />
  
  <!-- 会员卡片元素 -->
  <rect x="90" y="100" width="120" height="80" rx="10" ry="10" stroke="#FFF" stroke-width="3" fill="none" />
  <circle cx="120" cy="140" r="15" stroke="#FFF" stroke-width="2" fill="none" />
  <line x1="140" y1="130" x2="190" y2="130" stroke="#FFF" stroke-width="2" />
  <line x1="140" y1="145" x2="190" y2="145" stroke="#FFF" stroke-width="2" />
  <line x1="140" y1="160" x2="170" y2="160" stroke="#FFF" stroke-width="2" />
  
  <!-- 文字 -->
  <text x="150" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFF" text-anchor="middle">尊贵会员</text>
  <text x="150" y="270" font-family="Arial, sans-serif" font-size="22" fill="#FFF" text-anchor="middle">专属特权</text>
</svg>